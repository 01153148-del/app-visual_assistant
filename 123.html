<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>語音視覺助手 (無障礙版)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #000; /* 高對比黑底 */
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 隱藏攝影機預覽，但保持運作（盲人不需要看，節省能源與畫面複雜度） */
        video {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
        }

        /* 大面積操作區 */
        .touch-zone {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            border: 4px solid #444;
            margin: 10px;
            border-radius: 20px;
            transition: background 0.2s;
        }

        /* 每個動作有鮮明的顏色區分（針對弱視者） */
        #captureZone { background: #0056b3; } /* 深藍 */
        #askZone { background: #4a148c; }     /* 深紫 */
        
        .touch-zone:active {
            background: #fff !important;
            color: #000;
        }

        #status {
            padding: 10px;
            text-align: center;
            background: #333;
            font-size: 1.2rem;
        }

        .config-area {
            background: #222;
            padding: 10px;
            font-size: 0.8rem;
        }

        input {
            width: 100%;
            padding: 8px;
            background: #000;
            color: #0f0; /* 螢光綠文字 */
            border: 1px solid #555;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="status">正在啟動語音助手...</div>

    <div id="captureZone" class="touch-zone" role="button" aria-label="按這裡拍照">
        1. 點擊上半部：拍照
    </div>

    <div id="askZone" class="touch-zone" role="button" aria-label="按這裡開始分析">
        2. 點擊下半部：分析
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <div class="config-area">
        <label>API Key (設定一次後會自動儲存):</label>
        <input type="password" id="apiKey" placeholder="在此輸入您的 Gemini API Key">
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureZone = document.getElementById('captureZone');
        const askZone = document.getElementById('askZone');
        const status = document.getElementById('status');
        const apiKeyInput = document.getElementById('apiKey');

        let capturedImage = null;
        let lastResponse = "尚未有任何分析結果。";
        let modelName = 'gemini-1.5-flash'; // 建議使用 flash，速度較快

        // 初始化：讀取儲存的 API Key
        apiKeyInput.value = localStorage.getItem('gemini_api_key') || '';

        apiKeyInput.addEventListener('change', () => {
            localStorage.setItem('gemini_api_key', apiKeyInput.value);
            speak("API Key 已儲存");
        });

        // 核心語音功能
        function speak(text) {
            window.speechSynthesis.cancel(); // 停止目前的說話
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW';
            utterance.rate = 1.1; // 稍微加快語速
            window.speechSynthesis.speak(utterance);
            status.textContent = text;
        }

        // 引導語音
        window.onload = () => {
            setTimeout(() => {
                speak("視覺助理已開啟。請點擊螢幕上半部拍照，下半部進行分析。");
            }, 1000);
            initWebcam();
        };

        async function initWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                video.srcObject = stream;
            } catch (err) {
                speak("無法開啟相機，請檢查權限。");
            }
        }

        // 操作 1：拍照
        captureZone.addEventListener('click', () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            capturedImage = canvas.toDataURL('image/jpeg', 0.8);
            speak("已拍好照片，請點擊螢幕下半部開始分析。");
        });

        // 操作 2：分析
        askZone.addEventListener('click', async () => {
            const key = apiKeyInput.value.trim();
            if (!key) {
                speak("請先輸入 API Key。");
                return;
            }
            if (!capturedImage) {
                speak("請先點擊上半部拍照。");
                return;
            }

            speak("正在辨識中，請稍候...");
            
            const base64Data = capturedImage.split(',')[1];
            const payload = {
                contents: [{
                    parts: [
                        { text: "你是一位協助盲人的視覺助理。請用繁體中文描述這張圖裡有什麼，如果有文字請讀出來。請控制在三句話以內。" },
                        { inline_data: { mime_type: 'image/jpeg', data: base64Data } }
                    ]
                }]
            };

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                lastResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || "抱歉，我無法辨識這張圖片。";
                speak(lastResponse);
            } catch (err) {
                speak("連線錯誤，請檢查網路。");
            }
        });

        // 操作 3：重複朗讀（長按螢幕任何地方）
        document.body.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            speak("最後一次的分析結果是：" + lastResponse);
        });

    </script>
</body>
</html>
