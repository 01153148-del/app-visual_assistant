<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>語音助理 - 預覽版</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 攝影機預覽框：置中且不遮擋觸控 */
        .video-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 40%;
            border: 4px solid #00d4ff; /* 明亮的亮藍色框 */
            border-radius: 20px;
            overflow: hidden;
            z-index: 5;
            pointer-events: none; /* 讓點擊穿透到下層按鈕 */
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 大面積操作區 */
        .touch-zone {
            flex: 1;
            display: flex;
            align-items: flex-start; /* 讓文字靠上或下，避開中間預覽框 */
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 20px;
            z-index: 1;
            transition: opacity 0.2s;
        }

        #captureZone { 
            background: #003366; 
            align-items: flex-start; /* 文字在最上方 */
        } 
        
        #askZone { 
            background: #330066; 
            align-items: flex-end; /* 文字在最下方 */
        }

        .touch-zone:active {
            opacity: 0.7;
            background: #fff !important;
            color: #000;
        }

        /* 狀態列 */
        #status {
            position: absolute;
            top: 50%;
            width: 100%;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            color: #00d4ff;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
            padding: 5px 0;
            transform: translateY(-50%);
        }

        /* 設定區隱藏在最下面 */
        .config-area {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.8);
            padding: 5px;
            z-index: 100;
            font-size: 12px;
        }
        input { width: 70%; background: #222; color: #fff; border: 1px solid #444; }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video id="video" autoplay playsinline></video>
    </div>

    <div id="status">準備中...</div>

    <div id="captureZone" class="touch-zone">點擊上方：拍照</div>
    <div id="askZone" class="touch-zone">點擊下方：開始辨識</div>

    <canvas id="canvas" style="display:none;"></canvas>

    <div class="config-area">
        Key: <input type="password" id="apiKey">
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureZone = document.getElementById('captureZone');
        const askZone = document.getElementById('askZone');
        const status = document.getElementById('status');
        const apiKeyInput = document.getElementById('apiKey');

        let capturedImage = null;
        let lastResponse = "尚未有結果";
        const modelName = 'gemini-1.5-flash';

        // 讀取 Key
        apiKeyInput.value = localStorage.getItem('gemini_api_key') || '';
        apiKeyInput.onchange = () => localStorage.setItem('gemini_api_key', apiKeyInput.value);

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW';
            window.speechSynthesis.speak(utterance);
            status.textContent = text;
        }

        // 初始化相機
        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: 1280, height: 720 } 
                });
                video.srcObject = stream;
                speak("視覺助理已就緒。點擊上方拍照，下方分析。");
            } catch (err) {
                speak("相機啟動失敗。");
            }
        }

        // 拍照動作
        captureZone.onclick = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            capturedImage = canvas.toDataURL('image/jpeg', 0.8);
            speak("已擷取畫面，請點擊下方進行辨識。");
        };

        // 辨識動作
        askZone.onclick = async () => {
            const key = apiKeyInput.value.trim();
            if (!key) return speak("請先設定 API KEY");
            if (!capturedImage) return speak("請先拍照");

            speak("辨識中...");
            
            try {
                const base64Data = capturedImage.split(',')[1];
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "你是一位協助盲人的視覺助理。請用繁體中文簡短描述圖中內容，若有文字請讀出。三句以內。" },
                                { inline_data: { mime_type: 'image/jpeg', data: base64Data } }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                lastResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || "無法辨識";
                speak(lastResponse);
            } catch (err) {
                speak("連線失敗");
            }
        };

        // 長按重複讀取
        document.body.oncontextmenu = (e) => {
            e.preventDefault();
            speak(lastResponse);
        };

        init();
    </script>
</body>
</html>
