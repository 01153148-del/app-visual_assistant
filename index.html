<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>視覺助理（可視畫面＋大按鈕版）</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #111111;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 15px;
            align-items: center;
        }
        
        h1 { 
            text-align: center; 
            margin: 10px 0; 
            font-size: 1.5rem;
            color: #22c55e;
        }

        /* 設定區塊 */
        .api-key-container {
            width: 100%;
            max-width: 640px;
            background: #222;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .api-key-container label {
            display: block;
            margin-bottom: 5px;
            font-size: 1rem;
        }
        .api-key-container input {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border: 2px solid #fff;
            border-radius: 8px;
            background: #000;
            color: #fff;
        }

        /* 視訊畫面區塊 */
        #video-container {
            width: 100%;
            max-width: 640px;
            margin-bottom: 15px;
            position: relative;
        }

        video {
            display: block;
            width: 100%;
            border-radius: 8px;
            background: #000;
            border: 2px solid #333;
        }

        /* 超大主按鈕：大幅增加高度與字體大小 */
        #mainActionBtn {
            width: 100%;
            max-width: 640px;
            margin: 15px 0;
            background: #22c55e;
            color: #000000;
            font-size: 2rem; /* 字體放大 */
            font-weight: bold;
            border: none;
            border-radius: 16px; /* 圓角加大 */
            cursor: pointer;
            padding: 40px 20px; /* 上下留白大幅增加，讓按鈕變超高 */
            box-shadow: 0 8px 16px rgba(34, 197, 94, 0.3); /* 加上陰影增加立體感 */
            transition: transform 0.1s, background 0.2s; /* 加入點擊時的微小動畫 */
        }
        #mainActionBtn:active {
            background: #16a34a;
            transform: scale(0.98); /* 點擊時稍微縮小，增加手感 */
        }
        #mainActionBtn:disabled {
            background: #555555;
            color: #888888;
            box-shadow: none;
            transform: none;
        }

        /* 狀態文字區塊 */
        #status {
            width: 100%;
            max-width: 640px;
            font-size: 1.2rem;
            padding: 15px;
            text-align: center;
            background: #222;
            border-radius: 8px;
            min-height: 60px;
            border: 1px solid #333;
            margin-bottom: 20px;
        }

        canvas {
            display: none;
        }
    </style>
</head>
<body>
    <h1>語音視覺助理</h1>
    
    <div class="api-key-container">
        <label for="apiKey">設定您的 Gemini 金鑰：</label>
        <input type="password" id="apiKey" placeholder="請貼上 API Key">
    </div>

    <!-- 相機畫面區塊 -->
    <div id="video-container">
        <video id="video" autoplay playsinline></video>
    </div>

    <!-- 主按鈕 (移到狀態文字上方，更方便按) -->
    <button id="mainActionBtn" aria-label="點擊拍攝並用語音描述前方畫面" disabled>
        拍攝並描述前方
    </button>

    <!-- 狀態區塊 -->
    <div id="status" aria-live="assertive">系統啟動中...</div>

    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const mainActionBtn = document.getElementById('mainActionBtn');
        const status = document.getElementById('status');
        const apiKeyInput = document.getElementById('apiKey');

        let apiKey = localStorage.getItem('gemini_api_key') || '';
        const modelName = 'gemini-2.5-flash';

        if (apiKey) {
            apiKeyInput.value = apiKey;
        }

        apiKeyInput.addEventListener('input', (e) => {
            apiKey = e.target.value.trim();
            localStorage.setItem('gemini_api_key', apiKey);
        });

        function speak(text) {
            speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW';
            speechSynthesis.speak(utterance);
        }

        function updateStatus(text, announce = true) {
            status.innerHTML = text;
            if (announce) speak(text);
        }

        async function initWebcam() {
            try {
                const constraints = {
                    video: { facingMode: 'environment' }
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                updateStatus('相機已準備就緒，點擊大按鈕拍攝。');
                mainActionBtn.disabled = false;
            } catch (err) {
                updateStatus('無法開啟相機，請檢查權限設定。');
                console.error(err);
            }
        }

        async function captureAndAnalyze() {
            if (!apiKey) {
                updateStatus('請先在畫面上方輸入 API 金鑰。');
                return;
            }

            mainActionBtn.disabled = true;
            updateStatus('正在拍攝並分析中，請稍候...');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0);
            const capturedImage = canvas.toDataURL('image/jpeg', 0.85);
            const base64Data = capturedImage.split(',')[1];

            const promptText = "請用繁體中文簡短描述這張圖片裡的主要物品或場景（兩到三句話以內）。請直接輸出純文字，絕對不要使用任何 Markdown 標記符號（如星號、井字號或粗體），以便語音軟體朗讀。";

            const payload = {
                contents: [{
                    parts: [
                        { text: promptText },
                        { inline_data: { mime_type: 'image/jpeg', data: base64Data } }
                    ]
                }],
                generationConfig: {
                    temperature: 0.7,
                    maxOutputTokens: 500
                }
            };

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`API 錯誤`);
                }

                const data = await response.json();
                const aiResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || '抱歉，無法辨識畫面。';
                
                updateStatus(aiResponse);

            } catch (err) {
                updateStatus('分析時發生錯誤，請檢查網路連線或金鑰是否正確。');
            } finally {
                mainActionBtn.disabled = false;
            }
        }

        mainActionBtn.addEventListener('click', captureAndAnalyze);

        initWebcam();
    </script>
</body>
</html>
